<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>微信公众号排版工具</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    header { text-align: center; margin-bottom: 20px; }
    h1 { color: #333; margin-bottom: 8px; }
    .subtitle { color: #666; font-size: 14px; }
    .main { display: flex; gap: 20px; }
    .panel { flex: 1; background: #fff; border-radius: 8px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #eee; }
    .panel-title { font-weight: 600; color: #333; }
    .btn { background: #07c160; color: #fff; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 14px; }
    .btn:hover { background: #06ad56; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    textarea { width: 100%; height: 500px; border: 1px solid #ddd; border-radius: 4px; padding: 12px; font-size: 14px; font-family: monospace; resize: vertical; }
    textarea:focus { outline: none; border-color: #07c160; }
    #output { height: 500px; overflow-y: auto; padding: 12px; border: 1px solid #ddd; border-radius: 4px; background: #fafafa; }
    #output h2 { font-size: 140%; text-align: center; font-weight: normal; margin: 80px 10px 40px; }
    #output h3 { font-weight: bold; font-size: 120%; margin: 40px 10px 20px; }
    #output p { margin: 10px; line-height: 1.6; }
    #output blockquote { color: rgb(91,91,91); padding: 1px 0 1px 10px; background: rgba(158,158,158,0.1); border-left: 3px solid rgb(158,158,158); }
    #output code { font-size: 90%; color: #ff3502; background: #f8f5ec; padding: 3px 5px; border-radius: 2px; }
    #output .code-snippet__fix { display: flex; margin: 20px 0; background: #f7f7f7; border: 1px solid #ececec; border-radius: 2px; }
    #output .code-snippet__line-index { list-style: none; padding: 10px 0; margin: 0; border-right: 1px solid #ececec; background: #fafafa; min-width: 40px; text-align: right; }
    #output .code-snippet__line-index li { padding: 0 8px; color: #999; font-size: 12px; }
    #output .code-snippet__js { flex: 1; padding: 10px; overflow-x: auto; margin: 0; background: #fff; }
    #output .code-snippet__js code { background: none; padding: 0; color: #333; }
    #output img { border-radius: 4px; display: block; margin: 20px auto; max-width: 100%; }
    #output table { border-collapse: collapse; margin: 20px; width: calc(100% - 40px); }
    #output th, #output td { border: 1px solid #dfdfdf; padding: 4px 8px; font-size: 80%; }
    #output thead { background: rgba(0,0,0,0.05); }
    #output a { color: #07c160; }
    #output sup { color: #999; font-size: 12px; }
    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #07c160; color: #fff; padding: 12px 24px; border-radius: 4px; opacity: 0; transition: opacity 0.3s; }
    .toast.show { opacity: 1; }
    footer { text-align: center; margin-top: 20px; padding: 20px; color: #999; font-size: 14px; }
    footer a { color: #07c160; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>微信公众号排版工具</h1>
      <p class="subtitle">将 Markdown 转换为微信公众号样式，支持一键复制</p>
    </header>
    <div class="main">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Markdown 输入</span>
          <button class="btn" onclick="format()">格式化</button>
        </div>
        <textarea id="input" placeholder="在此输入 Markdown 内容..."># 一级标题

## 二级标题

**粗体**，*斜体*，***粗体加斜体***，`行内代码`

- 无序列表 1
- 无序列表 2
  - 子列表

1. 有序列表 1
2. 有序列表 2

> 引用内容

[链接文字](https://example.com)

![图片](https://via.placeholder.com/400x200)

```
代码块
```

| 表头 | 表头 |
| ---- | ---- |
| 单元格 | 单元格 |
</textarea>
      </div>
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">预览</span>
          <button class="btn" id="copyBtn" onclick="copy()">复制内容</button>
        </div>
        <div id="output"></div>
      </div>
    </div>
    <footer>
      <a href="../">← 返回首页</a>
    </footer>
  </div>
  <div class="toast" id="toast">已复制到剪贴板</div>

  <script>
    // Minimal markdown parser (no external deps)
    const md = {
      escape: s => s.replace(/</g, '&lt;').replace(/>/g, '&gt;'),
      parse: function(text) {
        text = text || '';
        const lines = text.split('\n');
        let html = [], inCode = false, codeLang = '', codeLines = [];
        for (let i = 0; i < lines.length; i++) {
          let line = lines[i];
          // code block
          if (line.startsWith('```')) {
            if (!inCode) { inCode = true; codeLang = line.slice(3).trim(); codeLines = []; continue; }
            else { inCode = false; html.push(this.renderCode(codeLines.join('\n'), codeLang)); codeLines = []; continue; }
          }
          if (inCode) { codeLines.push(line); continue; }
          // hr
          if (line.match(/^---?$/)) { html.push('<hr style="border-style:solid;border-width:1px 0 0;border-color:rgba(0,0,0,0.1);transform:scale(1,0.5);transform-origin:0 0">'); continue; }
          // headings
          let h = line.match(/^(#{1,6})\s+(.*)/);
          if (h) { let level = h[1].length; let tag = level < 3 ? 'h2' : 'h3'; html.push('<' + tag + ' ' + styleAttr(tag) + '>' + this.parseInline(h[2]) + '</' + tag + '>'); continue; }
          // blockquote
          if (line.startsWith('> ')) { html.push('<blockquote ' + styleAttr('blockquote') + '>' + this.parseInline(line.slice(2)) + '</blockquote>'); continue; }
          // ul/ol
          let ul = line.match(/^(\s*)[-*]\s+(.*)/);
          if (ul) { html.push(this.renderListItem(ul[2], ul[1])); continue; }
          let ol = line.match(/^(\s*)\d+\.\s+(.*)/);
          if (ol) { html.push(this.renderListItem(ol[2], ol[1], true)); continue; }
          // table
          if (line.match(/^\|/) && lines[i+1] && lines[i+1].match(/^\|[\s-|]+\|/)) {
            let rows = [];
            while (i < lines.length && lines[i].match(/^\|/)) {
              let cells = lines[i].split('|').slice(1, -1).map(c => c.trim());
              rows.push(cells); i++;
            }
            i--;
            html.push(this.renderTable(rows)); continue;
          }
          // paragraph
          if (line.trim()) html.push('<p ' + styleAttr('p') + '>' + this.parseInline(line) + '</p>');
          else html.push('');
        }
        return html.join('\n');
      },
      parseInline: function(text) {
        text = this.escape(text);
        // code
        text = text.replace(/`([^`]+)`/g, '<code ' + styleAttr('codespan') + '>$1</code>');
        // strong + em
        text = text.replace(/\*\*\*([^*]+)\*\*\*/g, '<strong ' + styleAttr('strong') + '><em>$1</em></strong>');
        text = text.replace(/\*\*([^*]+)\*\*/g, '<strong ' + styleAttr('strong') + '>$1</strong>');
        text = text.replace(/\*([^*]+)\*/g, '<em ' + styleAttr('strong') + '>$1</em>');
        // image
        text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img ' + styleAttr('image') + ' alt="$1" src="$2"/>');
        // link
        text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (m, t, l) => {
          if (l.startsWith('https://mp.weixin.qq.com')) return '<a href="' + l + '" ' + styleAttr('link') + '>' + t + '</a>';
          const ref = addFootnote(t, l);
          return '<span ' + styleAttr('link') + '>' + t + '<sup>[' + ref + ']</sup></span>';
        });
        return text;
      },
      renderCode: function(text, lang) {
        const lines = text.split('\n');
        const codeLines = lines.map(l => '<code><span class="code-snippet_outer">' + (l || '<br>') + '</span></code>').join('');
        const nums = lines.map(() => '<li></li>').join('');
        return '<section class="code-snippet__fix code-snippet__js"><ul class="code-snippet__line-index code-snippet__js">' + nums + '</ul><pre class="code-snippet__js" data-lang="' + (lang || '') + '">' + codeLines + '</pre></section>';
      },
      renderListItem: function(text, indent, ordered) {
        return '<span ' + styleAttr('listitem') + '><span style="margin-right:10px">' + (ordered ? '1.' : '•') + '</span>' + this.parseInline(text) + '</span>';
      },
      renderTable: function(rows) {
        if (!rows.length) return '';
        let header = rows[0].map(c => '<td ' + styleAttr('td') + '><b>' + c + '</b></td>').join('');
        let body = rows.slice(2).map(row => '<tr>' + row.map(c => '<td ' + styleAttr('td') + '>' + c + '</td>').join('') + '</tr>').join('');
        return '<table ' + styleAttr('table') + '><thead ' + styleAttr('thead') + '><tr>' + header + '</tr></thead><tbody>' + body + '</tbody></table>';
      }
    };

    const defaultTheme = {
      BASE: { 'text-align': 'left', 'color': '#3f3f3f', 'line-height': '1.5' },
      block: {
        h2: { 'font-size': '140%', 'text-align': 'center', 'font-weight': 'normal', 'margin': '80px 10px 40px' },
        h3: { 'font-weight': 'bold', 'font-size': '120%', 'margin': '40px 10px 20px' },
        p: { 'margin': '10px', 'line-height': '1.6' },
        blockquote: { 'color': 'rgb(91,91,91)', 'padding': '1px 0 1px 10px', 'background': 'rgba(158,158,158,0.1)', 'border-left': '3px solid rgb(158,158,158)' },
        code: { 'font-size': '80%', 'overflow': 'auto', 'color': '#333', 'background': 'rgb(247,247,247)', 'border-radius': '2px', 'padding': '10px', 'line-height': '1.3', 'border': '1px solid rgb(236,236,236)', 'margin': '20px 0' },
        image: { 'border-radius': '4px', 'display': 'block', 'margin': '20px auto', 'max-width': '100%' },
        ol: { 'margin-left': '0', 'padding-left': '20px' },
        ul: { 'margin-left': '0', 'padding-left': '20px', 'list-style': 'circle' },
        footnotes: { 'margin': '10px', 'font-size': '14px' }
      },
      inline: {
        listitem: { 'text-indent': '-20px', 'display': 'block', 'margin': '10px' },
        codespan: { 'font-size': '90%', 'color': '#ff3502', 'background': '#f8f5ec', 'padding': '3px 5px', 'border-radius': '2px' },
        link: { 'color': '#07c160' },
        strong: { 'color': '#ff3502' },
        table: { 'border-collapse': 'collapse', 'margin': '20px' },
        thead: { 'background': 'rgba(0,0,0,0.05)' },
        td: { 'font-size': '80%', 'border': '1px solid #dfdfdf', 'padding': '4px 8px' }
      }
    };

    function styleAttr(name) {
      const dict = { ...defaultTheme.BASE, ...(defaultTheme.inline[name] || {}), ...(defaultTheme.block[name] || {}) };
      return 'style="' + Object.entries(dict).map(([k, v]) => k + ':' + v).join(';') + '"';
    }

    let footnotes = [], footnoteIndex = 0;
    function addFootnote(title, link) {
      footnoteIndex++;
      footnotes.push([footnoteIndex, title, link]);
      return footnoteIndex;
    }

    const renderer = new marked.Renderer();
    renderer.heading = (text, level) => {
      const tag = level < 3 ? 'h2' : 'h3';
      return '<' + tag + ' ' + styleAttr(tag) + '>' + text + '</' + tag + '>';
    };
    renderer.paragraph = (text) => '<p ' + styleAttr('p') + '>' + text + '</p>';
    renderer.blockquote = (text) => '<blockquote ' + styleAttr('blockquote') + '>' + text + '</blockquote>';
    renderer.code = (text, lang) => {
      const safeText = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const lines = safeText.split('\n');
      const codeLines = lines.map(line => '<code><span class="code-snippet_outer">' + (line || '<br>') + '</span></code>').join('');
      const numbers = lines.map(() => '<li></li>').join('');
      return '<section class="code-snippet__fix code-snippet__js"><ul class="code-snippet__line-index code-snippet__js">' + numbers + '</ul><pre class="code-snippet__js" data-lang="' + (lang || '') + '">' + codeLines + '</pre></section>';
    };
    renderer.codespan = (text) => '<code ' + styleAttr('codespan') + '>' + text + '</code>';
    renderer.listitem = (text) => '<span ' + styleAttr('listitem') + '><span style="margin-right:10px"><%s/></span>' + text + '</span>';
    renderer.list = (text, ordered) => {
      const segments = text.split('<%s/>');
      if (!ordered) return '<p ' + styleAttr('ul') + '>' + segments.join('•') + '</p>';
      let result = segments[0];
      for (let i = 1; i < segments.length; i++) result += i + '.' + segments[i];
      return '<p ' + styleAttr('ol') + '>' + result + '</p>';
    };
    renderer.image = (href, title, text) => '<img ' + styleAttr('image') + ' src="' + href + '" title="' + (title || '') + '" alt="' + text + '"/>';
    renderer.link = (href, title, text) => {
      if (href.startsWith('https://mp.weixin.qq.com')) return '<a href="' + href + '" title="' + (title || text) + '" ' + styleAttr('link') + '>' + text + '</a>';
      if (href === text) return text;
      const ref = addFootnote(title || text, href);
      return '<span ' + styleAttr('link') + '>' + text + '<sup>[' + ref + ']</sup></span>';
    };
    renderer.strong = (text) => '<strong ' + styleAttr('strong') + '>' + text + '</strong>';
    renderer.em = renderer.strong;
    renderer.table = (header, body) => '<table ' + styleAttr('table') + '><thead ' + styleAttr('thead') + '>' + header + '</thead><tbody>' + body + '</tbody></table>';
    renderer.tablerow = (text) => '<tr>' + text + '</tr>';
    renderer.tablecell = (text) => '<td ' + styleAttr('td') + '>' + text + '</td>';
    renderer.hr = () => '<hr style="border-style:solid;border-width:1px 0 0;border-color:rgba(0,0,0,0.1);transform:scale(1,0.5);transform-origin:0 0">';

    marked.setOptions({ renderer, breaks: true });

    function format() {
      const input = document.getElementById('input').value;
      footnotes = [];
      footnoteIndex = 0;
      let html = md.parse(input);
      if (footnotes.length > 0) {
        const footnoteHtml = footnotes.map(([idx, title, link]) => {
          return '<code style="font-size:90%;opacity:0.6;">[' + idx + ']</code> ' + (title === link ? '<i>' + title + '</i>' : title + ': <i>' + link + '</i>') + '<br/>';
        }).join('');
        html += '<h3 ' + styleAttr('h3') + '>References</h3><p ' + styleAttr('footnotes') + '>' + footnoteHtml + '</p>';
      }
      document.getElementById('output').innerHTML = html;
    }

    function copy() {
      const output = document.getElementById('output');
      const range = document.createRange();
      range.selectNode(output);
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(range);
      document.execCommand('copy');
      window.getSelection().removeAllRanges();
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    format();
  </script>
</body>
</html>
