<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EathVader's Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
a { color: #60a5fa; text-decoration: none; }

.hero { text-align: center; padding: 5rem 1rem 2rem; }
.hero h1 { font-size: 2.5rem; font-weight: 800; color: #f8fafc; margin-bottom: .5rem; }
.hero h1 span { background: linear-gradient(90deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.hero p { color: #94a3b8; font-size: 1.1rem; }

.grid { max-width: 800px; margin: 2rem auto; padding: 0 1.5rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.25rem; }

.card {
  background: #1e293b; border: 1px solid #334155; border-radius: 12px;
  padding: 1.5rem; transition: border-color .2s, transform .2s;
  display: block;
}
.card:hover { border-color: #60a5fa; transform: translateY(-2px); text-decoration: none; }
.card .tag { display: inline-block; background: #172554; color: #60a5fa; font-size: .75rem; padding: .2rem .6rem; border-radius: 999px; margin-bottom: .75rem; }
.card h2 { font-size: 1.25rem; color: #f8fafc; margin-bottom: .5rem; }
.card p { color: #94a3b8; font-size: .9rem; line-height: 1.6; }
.card .meta { margin-top: .75rem; font-size: .8rem; color: #64748b; }

footer { text-align: center; padding: 3rem 1rem 2rem; color: #475569; font-size: .85rem; }
</style>
</head>
<body>

<header class="hero">
  <h1>🧪 <span>EathVader</span>'s Lab</h1>
  <p>学习笔记 & 交互式教程</p>
</header>

<div class="grid">
  <a class="card" href="microgpt/">
    <span class="tag">🧠 Deep Learning</span>
    <h2>MicroGPT 交互式教程</h2>
    <p>用 ~200 行纯 Python 从零实现 GPT 的完整训练与推理。包含 6 个交互演示、5 张架构图，覆盖 Autograd、Transformer、Adam 等核心概念。</p>
    <div class="meta">基于 Andrej Karpathy 的代码 · 2026-03</div>
  </a>
</div>

<footer>
  <p><a href="https://github.com/EathVader" target="_blank">GitHub @EathVader</a></p>
</footer>

</body>
</html>
